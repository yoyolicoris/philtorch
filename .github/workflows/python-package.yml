# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # caching pip dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8
        pip install torch --index-url https://download.pytorch.org/whl/cpu
    - name: Install project dependencies
      run: |
        pip install -e .[dev] --no-build-isolation
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        pytest --cov-branch --cov-report=xml

    - name: Upload coverage reports to Codecov
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

  build-macos:
    if: github.event_name == 'pull_request'
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install libomp
      run: |
        brew install libomp
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8
        pip cache purge || true
    - name: Install torch
      run: |
        pip install torch
        export CXX=$(brew --prefix llvm@18)/bin/clang++
        export LDFLAGS="-L/opt/homebrew/opt/libomp/lib"
        export CPPFLAGS="-I/opt/homebrew/opt/libomp/include"
        pip install -e .[dev] --no-build-isolation --no-cache-dir
    - name: Print temporary debug info for macOS extension build (remove before merge)
      run: |
        echo "TODO: remove this step before merge"
        uname -a
        uname -m
        python -c "import platform, sys; print('python:', sys.version); print('machine:', platform.machine()); print('platform:', platform.platform())"
        python -m pip show torch philtorch || true
        ls -lh philtorch/
        find . -maxdepth 4 \( -name '_C*.so' -o -name '_C*.dylib' \) -print
        python - <<'PY'
        import glob
        import os
        import platform
        import site
        import sys
        import torch

        print("torch.__version__:", torch.__version__)
        print("torch.__file__:", torch.__file__)
        print("platform.machine:", platform.machine())
        print("sys.executable:", sys.executable)
        print("site-packages:", site.getsitepackages())

        import philtorch

        print("philtorch.__file__:", philtorch.__file__)
        print("philtorch.EXTENSION_LOADED:", getattr(philtorch, "EXTENSION_LOADED", None))
        print("source tree _C candidates:", glob.glob(os.path.join("philtorch", "_C*")))
        pkg_dir = os.path.dirname(philtorch.__file__)
        print("installed pkg _C candidates:", glob.glob(os.path.join(pkg_dir, "_C*")))
        print("has recurN:", hasattr(torch.ops.philtorch, "recurN"))
        print("has recur2:", hasattr(torch.ops.philtorch, "recur2"))
        print("has lti_recurN:", hasattr(torch.ops.philtorch, "lti_recurN"))
        print("has lti_recur2:", hasattr(torch.ops.philtorch, "lti_recur2"))
        print("has lti_recur:", hasattr(torch.ops.philtorch, "lti_recur"))
        import subprocess
        for path in glob.glob("philtorch/_C*"):
            print("file:", path)
            subprocess.run(["file", path], check=False)
        PY
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        pytest
