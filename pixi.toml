[workspace]
authors = ["Chin-Yun Yu <chin-yun.yu@qmul.ac.uk>"]
channels = ["https://prefix.dev/conda-forge", "nvidia"]
name = "philtorch"
platforms = ["linux-64", "osx-arm64"]

[dependencies]
ninja = ">=1.13.2,<2"
numba = ">=0.63.1,<0.64"
scipy = "*"
pytest = ">=9.0.2,<10"
pytest-cov = ">=7.0.0,<8"
jupyter = ">=1.1.1,<2"
matplotlib = ">=3.10.8,<4"
tqdm = ">=4.67.3,<5"

[target.linux-64.dependencies]
cuda-version = ">=13.0,<14"
pytorch-gpu = ">=2.9.1,<3"
cuda = { version = ">=13.0,<14", channel = "nvidia" }

[pypi-dependencies]
setuptools-git-versioning = ">=2.1.0, <3"
torchlpc = ">=0.7.2, <0.8"
philtorch = { path = ".", editable = true }
kazane = ">=1.0.4, <2"
helion = ">=1.0.0, <2"

[target.linux-64.pypi-dependencies]
pararnn = { git = "https://github.com/yoyolicoris/ml-pararnn.git", rev = "29299d19351f78c470abfe34a8483c6cbfab3303" }

[system-requirements]
cuda = "13.0"

[target.osx-arm64.dependencies]
pytorch-cpu = ">=2.9.1,<3"

[pypi-options]
no-build-isolation = true
